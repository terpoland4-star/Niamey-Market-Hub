<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#E05206">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Niamey Market Hub – Plateforme de boutiques en ligne">
    <meta name="author" content="HAM Global Words">
    <meta property="og:title" content="Niamey Market Hub">
    <meta property="og:description" content="Votre marketplace multi-boutiques">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" sizes="96x96" href="https://placehold.co/96x96/E05206/white?text=NMH">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <title>Niamey Market Hub</title>
</head>
<body>
    <noscript>
        <div style="padding:40px;text-align:center;background:#fff3cd;color:#856404;">
            <h2>⚠️ JavaScript requis</h2>
            <p>Cette application nécessite JavaScript.</p>
        </div>
    </noscript>

    <div class="banner">
        <div class="banner-text">🚧 Site en construction – Fonctionnalités limitées 🚧</div>
    </div>

    <header class="toolbar">
        <select id="lang-selector" class="toolbar-select">
            <option value="fr">🇫🇷 FR</option>
            <option value="en">🇬🇧 EN</option>
        </select>
        <div style="display:flex;gap:6px;">
            <button id="theme-btn" class="toolbar-btn"><i class="fas fa-moon"></i></button>
            <button id="contrast-btn" class="toolbar-btn"><i class="fas fa-adjust"></i></button>
            <button id="font-minus" class="toolbar-btn">A-</button>
            <button id="font-plus" class="toolbar-btn">A+</button>
            <button id="cart-btn" class="toolbar-btn">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main id="app">
        <div class="loading">Chargement...</div>
    </main>

    <footer id="footer"></footer>

    <div class="whatsapp-float">
        <a href="#" target="_blank" rel="noopener" class="whatsapp-btn" id="whatsapp-link">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <div class="modal-overlay" id="product-modal" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="cart-modal" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="cart-modal-close">&times;</button>
            <div id="cart-modal-content"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- SCRIPTS – ORDRE CRITIQUE -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/shop-loader.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>
</body>
</html>
